services:
  - type: web
    name: cara-mia
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cara-mia-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: GIPHY_API_KEY
        sync: false

databases:
  - name: cara-mia-db
    databaseName: cara_mia
    user: cara_mia_user
    plan: free
    postgresMajorVersion: "16"
    ipAllowList: []

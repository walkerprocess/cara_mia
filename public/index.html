<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cara Mia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="gradient-field" aria-hidden="true"></div>
    <div id="heartField" class="heart-field" aria-hidden="true"></div>
    <div id="themeField" class="theme-field" aria-hidden="true"></div>

    <main id="authView" class="auth-view view">
      <section id="loginPanel" class="auth-panel">
        <h1>Cara Mia</h1>
        <form id="loginForm" class="auth-form">
          <label>
            <span>ID</span>
            <input name="accountId" autocomplete="username" required />
          </label>
          <label>
            <span>Password</span>
            <input name="password" type="password" autocomplete="current-password" required />
          </label>
          <button class="primary-button" type="submit">Login</button>
          <button id="showSignupButton" class="secondary-button" type="button">Create a new account</button>
        </form>
      </section>

      <section id="signupPanel" class="auth-panel hidden">
        <h1>Cara Mia</h1>
        <form id="signupForm" class="auth-form">
          <label>
            <span>Email</span>
            <input name="email" type="email" autocomplete="email" required />
          </label>
          <label>
            <span>Account ID</span>
            <input name="accountId" autocomplete="username" required />
          </label>
          <label>
            <span>Password</span>
            <input name="password" type="password" autocomplete="new-password" minlength="8" required />
          </label>
          <button class="primary-button" type="submit">Create account</button>
          <button id="showLoginButton" class="secondary-button" type="button">Back to login</button>
        </form>
      </section>
    </main>

    <main id="studioView" class="studio-view view hidden">
      <div class="studio-topbar">
        <select id="exhibitPicker" aria-label="Exhibit"></select>
        <button id="cursorSettingsButton" class="icon-button cursor-settings-button" type="button" title="Cursor" aria-label="Cursor settings">
          <i data-lucide="settings"></i>
        </button>
        <button id="readModeButton" class="icon-button" type="button" title="View art" aria-label="View art only">
          <i data-lucide="image"></i>
        </button>
        <button id="editModeButton" class="icon-button hidden" type="button" title="Edit" aria-label="Back to editing">
          <i data-lucide="pencil"></i>
        </button>
        <button id="downloadShotButton" class="icon-button hidden" type="button" title="Download screenshot" aria-label="Download screenshot">
          <i data-lucide="download"></i>
        </button>
        <span id="rolePill" class="role-pill">OWNER</span>
        <button id="shareButton" class="share-button" type="button">SHARE</button>
        <button id="logoutButton" class="icon-button" type="button" title="Log out" aria-label="Log out">
          <i data-lucide="log-out"></i>
        </button>
      </div>

      <nav class="tool-menu" aria-label="Widget tools">
        <button class="tool-button" data-tool="canvas" type="button" title="Canvas">
          <i data-lucide="square"></i>
          <span>Canvas</span>
        </button>
        <button class="tool-button" data-tool="wordbox" type="button" title="Word box">
          <i data-lucide="type"></i>
          <span>Wordbox</span>
        </button>
        <button class="tool-button" data-tool="question" type="button" title="Question box">
          <i data-lucide="message-circle-question"></i>
          <span>Question</span>
        </button>
        <button class="tool-button" data-tool="music" type="button" title="Music">
          <i data-lucide="music-2"></i>
          <span>Music</span>
        </button>
        <button class="tool-button" data-tool="sticker" type="button" title="Sticker">
          <i data-lucide="sticker"></i>
          <span>Sticker</span>
        </button>
        <button class="tool-button" data-tool="picture" type="button" title="Picture">
          <i data-lucide="image-plus"></i>
          <span>Picture</span>
        </button>
        <button class="tool-button" data-tool="brush" type="button" title="Brush">
          <i data-lucide="paintbrush"></i>
          <span>Brush</span>
        </button>
      </nav>
      <input id="pictureUploadInput" type="file" accept="image/*" hidden />

      <aside id="brushPanel" class="brush-panel hidden" aria-label="Brush utensils">
        <div class="utensils">
          <button class="utensil active" data-brush="brush" type="button" title="Brush"><i data-lucide="paintbrush"></i></button>
          <button class="utensil" data-brush="pen" type="button" title="Pen"><i data-lucide="pen-line"></i></button>
          <button class="utensil" data-brush="fill" type="button" title="Fill"><i data-lucide="paint-bucket"></i></button>
          <button class="utensil" data-brush="eraser" type="button" title="Eraser"><i data-lucide="eraser"></i></button>
        </div>
        <div id="colorRail" class="color-rail"></div>
        <input id="brushSize" class="brush-size" type="range" min="2" max="34" value="8" aria-label="Brush size" />
      </aside>

      <div class="page-bar" aria-label="Pages">
        <select id="pagePicker" aria-label="Page"></select>
        <button id="addPageButton" class="icon-button" type="button" title="Add page" aria-label="Add page">
          <i data-lucide="plus"></i>
        </button>
        <button id="renamePageButton" class="icon-button" type="button" title="Rename page" aria-label="Rename page">
          <i data-lucide="edit-3"></i>
        </button>
      </div>

      <section id="boardViewport" class="board-viewport" aria-label="Art exhibit viewport">
        <div id="board" class="board" aria-label="Art exhibit canvas">
          <div id="dragPreview" class="drag-preview hidden"></div>
          <div id="localCursor" class="local-cursor hidden" aria-hidden="true"></div>
        </div>
      </section>

      <div class="zoom-controls" aria-label="Zoom">
        <button id="zoomOutButton" class="icon-button" type="button" title="Zoom out" aria-label="Zoom out">
          <i data-lucide="minus"></i>
        </button>
        <span id="zoomValue" class="zoom-value">100%</span>
        <button id="zoomInButton" class="icon-button" type="button" title="Zoom in" aria-label="Zoom in">
          <i data-lucide="plus"></i>
        </button>
      </div>
    </main>

    <dialog id="shareDialog" class="modal">
      <form id="shareForm" method="dialog" class="modal-panel">
        <button class="modal-close" value="cancel" type="button" aria-label="Close"><i data-lucide="x"></i></button>
        <h2>Share</h2>
        <label>
          <span>Email</span>
          <input name="email" type="email" required />
        </label>
        <label>
          <span>Permission</span>
          <select name="role" required>
            <option value="viewer">Viewer</option>
            <option value="collaborator">Collaborator</option>
          </select>
        </label>
        <button class="primary-button" type="submit">Apply</button>
      </form>
    </dialog>

    <dialog id="pageDialog" class="modal">
      <form id="pageForm" method="dialog" class="modal-panel">
        <button class="modal-close" value="cancel" type="button" aria-label="Close"><i data-lucide="x"></i></button>
        <h2 id="pageDialogTitle">Page</h2>
        <label>
          <span>Name</span>
          <input id="pageNameInput" name="name" maxlength="40" required />
        </label>
        <button class="primary-button" type="submit">Save</button>
      </form>
    </dialog>

    <dialog id="cursorDialog" class="modal">
      <section class="modal-panel cursor-panel">
        <button class="modal-close" type="button" aria-label="Close"><i data-lucide="x"></i></button>
        <h2>Cursor</h2>
        <section class="settings-section">
          <h3>Cursor</h3>
          <div class="cursor-preview-row">
            <div id="cursorPreview" class="cursor-preview"></div>
            <input id="cursorColorInput" type="color" aria-label="Cursor color" />
          </div>
          <div id="cursorPresetGrid" class="cursor-preset-grid" aria-label="Cursor presets"></div>
          <label class="cursor-upload">
            <i data-lucide="image-up"></i>
            <span>Upload</span>
            <input id="cursorUploadInput" type="file" accept="image/*" />
          </label>
        </section>
        <section class="settings-section">
          <h3>Background</h3>
          <div id="backgroundPresetGrid" class="background-preset-grid" aria-label="Background presets"></div>
        </section>
      </section>
    </dialog>

    <dialog id="musicDialog" class="modal">
      <section class="modal-panel music-panel">
        <button class="modal-close" type="button" aria-label="Close"><i data-lucide="x"></i></button>
        <h2>Music</h2>
        <form id="musicSearchForm" class="music-search">
          <input id="musicSearchInput" placeholder="Search songs" autocomplete="off" required />
          <button class="primary-button compact" type="submit"><i data-lucide="search"></i></button>
        </form>
        <div id="musicResults" class="music-results"></div>
        <div id="musicChoice" class="music-choice hidden">
          <button data-presentation="cover" class="secondary-button" type="button">Album cover</button>
          <button data-presentation="player" class="secondary-button" type="button">Player only</button>
          <button id="applyMusicButton" class="primary-button" type="button">Apply</button>
        </div>
      </section>
    </dialog>

    <dialog id="assetDialog" class="modal">
      <section class="modal-panel asset-panel">
        <button class="modal-close" type="button" aria-label="Close"><i data-lucide="x"></i></button>
        <h2 id="assetDialogTitle">Sticker</h2>
        <form id="assetSearchForm" class="music-search">
          <input id="assetSearchInput" placeholder="Search" autocomplete="off" />
          <button class="primary-button compact" type="submit"><i data-lucide="search"></i></button>
        </form>
        <div id="assetResults" class="asset-results"></div>
      </section>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
